apiVersion: apps/v1
kind: Deployment
metadata:
  name: bias-communicator
  labels:
    app: bias-communicator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bias-communicator
  template:
    metadata:
      labels:
        app: bias-communicator
    spec:
      containers:
        - name: communicator
          image: bias-communicator:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: bias-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: communicator
spec:
  selector:
    app: bias-communicator
  ports:
    - port: 8000
      targetPort: 8000
