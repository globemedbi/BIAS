apiVersion: apps/v1
kind: Deployment
metadata:
  name: bias-db-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bias-db-agent
  template:
    metadata:
      labels:
        app: bias-db-agent
    spec:
      containers:
        - name: db-agent
          image: bias-db-agent:latest
          ports:
            - containerPort: 8003
          envFrom:
            - secretRef:
                name: bias-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: db-agent
spec:
  selector:
    app: bias-db-agent
  ports:
    - port: 8003
      targetPort: 8003
