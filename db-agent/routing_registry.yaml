# DB Agent — Routing Registry
# ─────────────────────────────────────────────────────────────────────────────
# Source of truth for every route the db-agent will accept.
# Connection details are now defined per-route, allowing the agent 
# to route to different Oracle instances, clusters, or schemas.
# ─────────────────────────────────────────────────────────────────────────────

service:
  name: db-agent
  port: 8003

routes:

  # ── Route 1: Inserts (Points to Server A) ───────────────────────────────────
  "pkg_procedure:PKG_AGENT_CLAIM.PROCESS_INSERT_ATTACHMENT_JSON":
    api_endpoint: /execute-procedure
    http_method: POST
    db_type: Oracle 23ai
    
    # NEW: Connection Details specific to this route
    database_connection:
      host: 192.168.244.198
      port: 1528
      service: aidev_pdb1.drdb.drdatabase.oraclevcn.com
      schema: mldsdev

    package: PKG_AGENT_CLAIM
    procedure: PROCESS_INSERT_ATTACHMENT_JSON
    call_type: json_clob
    input_keys:
      - claim_id
      - attachment_name
      - attachment_order
      - version
      - page_count
      - extracted_text
    output_keys:
      - status
      - message
      - row_id
    description: Upserts a claim attachment record.
    example_payload:
      target_procedure: PKG_AGENT_CLAIM.PROCESS_INSERT_ATTACHMENT_JSON
      token: <INTERNAL_SERVICE_TOKEN>
      service_name: claims-expert
      payload:
        claim_id: CLM-2025-001234
        attachment_name: EOB_page1.pdf
        attachment_order: 1
        version: 2
        page_count: 4
        extracted_text: "Patient: John Doe..."
    example_response:
      status: SUCCESS
      data:
        status: SUCCESS
        message: Attachment processed successfully.

  # ── Route 2: Summaries (Can point to Server A, B, or C) ─────────────────────
  "pkg_procedure:PKG_AGENT_CLAIM.PROCESS_UPDATE_SUMMARY_JSON":
    api_endpoint: /execute-procedure
    http_method: POST
    db_type: Oracle 23ai

    # NEW: Connection Details specific to this route
    database_connection:
      host: 192.168.244.198
      port: 1528
      service: aidev_pdb1.drdb.drdatabase.oraclevcn.com
      schema: mldsdev

    package: PKG_AGENT_CLAIM
    procedure: PROCESS_UPDATE_SUMMARY_JSON
    call_type: json_clob
    input_keys:
      - claim_id
      - attachment_name
      - version
      - summary_json
    output_keys:
      - status
      - message
    description: Updates the attachment_summary column (CLOB).
    example_payload:
      target_procedure: PKG_AGENT_CLAIM.PROCESS_UPDATE_SUMMARY_JSON
      token: <INTERNAL_SERVICE_TOKEN>
      service_name: claims-expert
      payload:
        claim_id: A0000001
        attachment_name: 9999999_test_insert.pdf
        version: 1
        summary_json: '{"status": "Verified"}'
    example_response:
      status: SUCCESS
      data:
        status: SUCCESS
        message: Summary updated successfully.